name: n8n
version: "1.0"
description: "工作流自动化 — AI 驱动的流程编排工具"
categories: [automation, ai]
author: PrivacyBox Team

params:
  - name: name
    type: string
    label: "服务名称"
    default: "n8n"
    required: true
    advanced: false

  - name: port
    type: number
    label: "Web 端口"
    default: 5678
    min: 1024
    max: 65535
    required: true
    advanced: false

  - name: encryption_key
    type: password
    label: "加密密钥"
    hint: "留空则自动生成"
    auto_generate: true
    advanced: false

  - name: timezone
    type: string
    label: "时区"
    default: "Asia/Shanghai"
    advanced: true

compose:
  version: "3.8"
  services:
    n8n:
      image: n8nio/n8n:latest
      container_name: "{{ name }}_app"
      ports:
        - "{{ privacy_ip }}:{{ port }}:5678"
      environment:
        N8N_ENCRYPTION_KEY: "{{ encryption_key }}"
        N8N_METRICS: "false"
        N8N_SKIP_WEBHOOK_DEREGISTRATION_SHUTDOWN: "true"
        N8N_HOST: localhost
        N8N_PORT: "{{ port }}"
        N8N_PROTOCOL: http
        TZ: "{{ timezone }}"
      volumes:
        - ./data/{{ name }}/data:/home/node/.n8n
      restart: unless-stopped
      labels:
        - "privacybox.managed=true"
        - "privacybox.name={{ name }}"

volumes: {}
