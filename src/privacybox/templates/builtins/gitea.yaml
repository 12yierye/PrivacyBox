name: gitea
version: "1.0"
description: "轻量级 Git 服务 — 自托管代码仓库"
categories: [development, devops]
author: PrivacyBox Team

params:
  - name: name
    type: string
    label: "服务名称"
    default: "gitea"
    required: true
    advanced: false

  - name: port
    type: number
    label: "Web 端口"
    default: 3000
    min: 1024
    max: 65535
    required: true
    advanced: false

  - name: ssh_port
    type: number
    label: "SSH 端口"
    default: 2222
    min: 1024
    max: 65535
    advanced: true

  - name: domain
    type: string
    label: "访问域名"
    default: "localhost"
    advanced: false

compose:
  version: "3.8"
  services:
    gitea:
      image: gitea/gitea:latest
      container_name: "{{ name }}_app"
      ports:
        - "{{ privacy_ip }}:{{ port }}:3000"
        - "{{ privacy_ip }}:{{ ssh_port }}:22"
      environment:
        USER_UID: 1000
        USER_GID: 1000
        GITEA__server__DOMAIN: "{{ domain }}"
        GITEA__server__ROOT_URL: "http://{{ domain }}:{{ port }}"
        GITEA__server__SSH_PORT: "{{ ssh_port }}"
        GITEA__database__DB_TYPE: sqlite3
      volumes:
        - ./data/{{ name }}/data:/data
        - ./data/{{ name }}/config:/etc/gitea
      restart: unless-stopped
      labels:
        - "privacybox.managed=true"
        - "privacybox.name={{ name }}"

volumes: {}
