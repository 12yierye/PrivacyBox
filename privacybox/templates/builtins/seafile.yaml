name: seafile
version: "1.0"
description: "高性能文件同步 — 比 Nextcloud 更快的私有云盘"
categories: [storage, productivity]
author: PrivacyBox Team

params:
  - name: name
    type: string
    label: "服务名称"
    default: "seafile"
    required: true
    advanced: false

  - name: port
    type: number
    label: "Web 端口"
    default: 8080
    min: 1024
    max: 65535
    required: true
    advanced: false

  - name: domain
    type: string
    label: "访问域名"
    default: "localhost"
    advanced: false

  - name: admin_email
    type: string
    label: "管理员邮箱"
    default: "admin@example.com"
    advanced: false

  - name: admin_password
    type: password
    label: "管理员密码"
    auto_generate: true
    advanced: false

  - name: secret_key
    type: password
    label: "密钥"
    auto_generate: true
    advanced: true

compose:
  version: "3.8"
  services:
    seafile:
      image: seafileltd/seafile-mc:latest
      container_name: "{{ name }}_app"
      ports:
        - "{{ privacy_ip }}:{{ port }}:80"
      environment:
        SEAFILE_SERVER_HOSTNAME: "{{ domain }}"
        SEAFILE_ADMIN_EMAIL: "{{ admin_email }}"
        SEAFILE_ADMIN_PASSWORD: "{{ admin_password }}"
        SEAFILE_SERVER_LETSENCRYPT: "false"
        DB_HOST: db
        DB_ROOT_PASSWD: "{{ secret_key }}"
        TIME_ZONE: "Asia/Shanghai"
      volumes:
        - ./data/{{ name }}/seafile:/shared
      restart: unless-stopped
      labels:
        - "privacybox.managed=true"
        - "privacybox.name={{ name }}"

    db:
      image: mariadb:10.11
      container_name: "{{ name }}_db"
      environment:
        MYSQL_ROOT_PASSWORD: "{{ secret_key }}"
        MYSQL_LOG_CONSOLE: "true"
      volumes:
        - ./data/{{ name }}/db:/var/lib/mysql
      restart: unless-stopped
      labels:
        - "privacybox.managed=true"
        - "privacybox.name={{ name }}"

    memcached:
      image: memcached:1.6-alpine
      container_name: "{{ name }}_memcached"
      restart: unless-stopped
      labels:
        - "privacybox.managed=true"
        - "privacybox.name={{ name }}"

volumes: {}
