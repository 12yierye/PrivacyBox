name: nextcloud
version: "1.2"
description: "私有云存储 — 文件同步、共享与协作"
categories: [storage, productivity]
author: PrivacyBox Team

params:
  - name: name
    type: string
    label: "服务名称"
    default: "nextcloud"
    required: true
    advanced: false

  - name: port
    type: number
    label: "Web 端口"
    default: 8080
    min: 1024
    max: 65535
    required: true
    advanced: false

  - name: domain
    type: string
    label: "访问域名"
    hint: "留空则绑定 localhost"
    default: ""
    required: false
    advanced: false

  - name: db_password
    type: password
    label: "数据库密码"
    hint: "留空则自动生成"
    default: ""
    auto_generate: true
    advanced: false

  - name: memory_limit
    type: number
    label: "内存上限 (MB)"
    default: 512
    min: 256
    advanced: true

  - name: timezone
    type: string
    label: "时区"
    default: "Asia/Shanghai"
    advanced: true

compose:
  version: "3.8"
  services:
    nextcloud:
      image: nextcloud:stable
      container_name: "{{ name }}_app"
      ports:
        - "{{ privacy_ip }}:{{ port }}:80"
      environment:
        POSTGRES_HOST: db
        POSTGRES_DB: nextcloud
        POSTGRES_USER: nextcloud
        POSTGRES_PASSWORD: "{{ db_password }}"
        NEXTCLOUD_ADMIN_USER: admin
        NEXTCLOUD_ADMIN_PASSWORD: "{{ db_password }}"
        NEXTCLOUD_TRUSTED_DOMAINS: "{{ domain }}"
        TZ: "{{ timezone }}"
      volumes:
        - ./data/{{ name }}/html:/var/www/html
        - ./data/{{ name }}/apps:/var/www/html/custom_apps
        - ./data/{{ name }}/config:/var/www/html/config
        - ./data/{{ name }}/data:/var/www/html/data
      restart: unless-stopped
      labels:
        - "privacybox.managed=true"
        - "privacybox.name={{ name }}"

    db:
      image: postgres:16-alpine
      container_name: "{{ name }}_db"
      environment:
        POSTGRES_DB: nextcloud
        POSTGRES_USER: nextcloud
        POSTGRES_PASSWORD: "{{ db_password }}"
        TZ: "{{ timezone }}"
      volumes:
        - ./data/{{ name }}/db:/var/lib/postgresql/data
      restart: unless-stopped
      labels:
        - "privacybox.managed=true"
        - "privacybox.name={{ name }}"

volumes: {}
