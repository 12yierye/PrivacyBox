name: navidrome
version: "1.0"
description: "音乐流媒体 — 自托管你的音乐收藏"
categories: [media, music]
author: PrivacyBox Team

params:
  - name: name
    type: string
    label: "服务名称"
    default: "navidrome"
    required: true
    advanced: false

  - name: port
    type: number
    label: "Web 端口"
    default: 4533
    min: 1024
    max: 65535
    required: true
    advanced: false

  - name: music_path
    type: string
    label: "音乐文件夹路径"
    default: "./music"
    required: true
    advanced: false

compose:
  version: "3.8"
  services:
    navidrome:
      image: deluan/navidrome:latest
      container_name: "{{ name }}_app"
      ports:
        - "{{ privacy_ip }}:{{ port }}:4533"
      environment:
        ND_SCANSCHEDULE: 1h
        ND_LOGLEVEL: info
        ND_SESSIONTIMEOUT: 24h
        ND_BASEURL: ""
      volumes:
        - ./data/{{ name }}/data:/data
        - "{{ music_path }}:/music:ro"
      restart: unless-stopped
      labels:
        - "privacybox.managed=true"
        - "privacybox.name={{ name }}"

volumes: {}
